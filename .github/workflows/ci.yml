name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (clj-kondo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clj-kondo
        run: |
          curl -sLO https://github.com/clj-kondo/clj-kondo/releases/download/v2024.03.13/clj-kondo-2024.03.13-linux-amd64.zip
          unzip clj-kondo-2024.03.13-linux-amd64.zip
          sudo mv clj-kondo /usr/local/bin/

      - name: Run clj-kondo
        run: clj-kondo --lint src || [ $? -eq 2 ]

  test:
    name: Test (Clojure)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tempus
          POSTGRES_PASSWORD: tempus_secret
          POSTGRES_DB: tempus_fugit
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Leiningen
        run: |
          wget https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein
          chmod +x lein
          sudo mv lein /usr/local/bin/
          lein version

      - name: Install deps
        run: lein deps

      - name: Check config file
        run: cat ${{ github.workspace }}/env/test/resources/config.edn

      - name: Create dev config
        run: |
          echo '{:database-url "jdbc:postgresql://localhost:5432/tempus_fugit?user=tempus&password=tempus_secret"}' > dev-config.edn

      - name: Run migrations
        run: lein run migrate
        env:
          DATABASE_URL: "jdbc:postgresql://localhost:5432/tempus_fugit?user=tempus&password=tempus_secret"

      - name: Run tests
        run: lein with-profile test test
        env:
          DATABASE_URL: "jdbc:postgresql://localhost:5432/tempus_fugit?user=tempus&password=tempus_secret"
